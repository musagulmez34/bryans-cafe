<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bryan's Cafe - Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Bryan's Cafe</a>
    <ul>
      <li><a href="index.html">About</a></li>
      <li><a href="menu.html" class="active">Menu</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <h2 style="margin-bottom: 20px;">Our Menu</h2>
    <div id="menu-container">
      <p>Loading menu...</p>
    </div>
  </main>

  <footer>
    <span>&#169; <span id="year"></span> Bryan's Cafe</span>
    <a href="privacy.html" target="_blank">Privacy Policy</a>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // Load menu data from menu.xml
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "menu.xml", true);
    xhr.onload = function () {
      if (xhr.status === 200) {
        var xml = xhr.responseXML;
        var items = xml.getElementsByTagName("item");
        var container = document.getElementById("menu-container");
        container.innerHTML = "";

        for (var i = 0; i < items.length; i++) {
          var name = items[i].getElementsByTagName("name")[0].textContent;
          var description = items[i].getElementsByTagName("description")[0].textContent;
          var price = items[i].getElementsByTagName("price")[0].textContent;
          var image = items[i].getElementsByTagName("image")[0].textContent;

          var card = document.createElement("div");
          card.className = "menu-card";
          card.innerHTML =
            "<img src='images/" + image + "' alt='" + name + "'>" +
            "<h3>" + name + "</h3>" +
            "<p>" + description + "</p>" +
            "<p class='price'>" + price + "</p>";

          container.appendChild(card);
        }
      }
    };
    xhr.send();
  </script>

</body>
</html>
